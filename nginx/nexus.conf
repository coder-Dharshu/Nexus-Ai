# Nexus AI — Nginx reverse proxy configuration
# Handles TLS termination so the FastAPI server stays on localhost:8000
#
# Setup:
#   1. Install: sudo apt install nginx certbot python3-certbot-nginx
#   2. Copy this file to /etc/nginx/sites-available/nexus
#   3. Get certificate: sudo certbot --nginx -d your-domain.com
#   4. Enable: sudo ln -s /etc/nginx/sites-available/nexus /etc/nginx/sites-enabled/
#   5. Test: sudo nginx -t
#   6. Reload: sudo systemctl reload nginx

# Rate limiting zones
limit_req_zone $binary_remote_addr zone=nexus_api:10m rate=10r/m;
limit_req_zone $binary_remote_addr zone=nexus_auth:10m rate=5r/m;
limit_conn_zone $binary_remote_addr zone=nexus_conn:10m;

# HTTP → HTTPS redirect
server {
    listen 80;
    listen [::]:80;
    server_name your-domain.com;

    # Only allow ACME challenge for cert renewal
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS main server
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name your-domain.com;

    # ── TLS ──────────────────────────────────────────────────────────────────
    # Certbot will fill these in after: certbot --nginx
    ssl_certificate     /etc/letsencrypt/live/your-domain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/your-domain.com/privkey.pem;

    # Modern TLS config (A+ on SSL Labs)
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # OCSP Stapling
    ssl_stapling on;
    ssl_stapling_verify on;
    resolver 8.8.8.8 1.1.1.1 valid=300s;

    # ── Security headers ──────────────────────────────────────────────────────
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "no-referrer" always;
    add_header Content-Security-Policy "default-src 'self'; frame-ancestors 'none';" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

    # ── Request limits ────────────────────────────────────────────────────────
    client_max_body_size 64k;
    client_body_timeout 10s;
    client_header_timeout 10s;
    keepalive_timeout 30s;
    send_timeout 60s;

    # Connection limit per IP
    limit_conn nexus_conn 20;

    # ── Logging ───────────────────────────────────────────────────────────────
    access_log /var/log/nginx/nexus_access.log combined;
    error_log  /var/log/nginx/nexus_error.log warn;

    # ── Routes ───────────────────────────────────────────────────────────────

    # Health check — no rate limit
    location /health/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Auth endpoints — strict rate limit (prevents brute force)
    location /auth/ {
        limit_req zone=nexus_auth burst=3 nodelay;
        limit_req_status 429;
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # SSE streaming endpoint — no buffering, long timeout
    location ~* /tasks/[^/]+/stream {
        limit_req zone=nexus_api burst=5 nodelay;
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # SSE requires no buffering and long timeout
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        chunked_transfer_encoding on;
    }

    # API routes — standard rate limit
    location / {
        limit_req zone=nexus_api burst=10 nodelay;
        limit_req_status 429;
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_connect_timeout 5s;
        proxy_send_timeout 60s;
    }

    # Block common attack paths
    location ~ /\.(env|git|htaccess|DS_Store) {
        deny all;
        return 404;
    }
    location ~ /(admin|wp-admin|phpmyadmin|.php) {
        deny all;
        return 404;
    }
}
