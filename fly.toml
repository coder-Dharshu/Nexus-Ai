app = "nexus-ai"
primary_region = "sin"

[build]
  dockerfile = "docker/Dockerfile"

[env]
  HOST = "0.0.0.0"
  PORT = "8080"
  ENVIRONMENT = "production"
  USE_GROQ_PRIMARY = "true"
  WORKERS = "2"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

  [http_service.concurrency]
    type = "connections"
    hard_limit = 25
    soft_limit = 20

[[vm]]
  memory = "1gb"
  cpu_kind = "shared"
  cpus = 1

[[mounts]]
  source = "nexus_data"
  destination = "/app/data"

[checks]
  [checks.health]
    grace_period = "30s"
    interval = "30s"
    method = "get"
    path = "/health/ping"
    port = 8080
    timeout = "10s"
    type = "http"
